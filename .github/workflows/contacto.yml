name: Acto pide contacto

on:
  workflow_dispatch:
    inputs:
      contact:
        description: 'Contact request details'
        required: true

jobs:
  process-contact:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v3
    - name: Process Contact Request
      env:
        PROD_FLAG: ${{ secrets.PROD_FLAG }}
      run: |
        chmod +x ./app/deploy.sh
        echo "Processing contact request: ${{ github.event.inputs.contact }}"
        ./app/deploy.sh ${{ github.event.inputs.contact }}
